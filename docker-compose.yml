version: "3.9"

services:
  db:
    image: postgres:16
    container_name: commute_db
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/commute-app-schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      args:
        NODE_ENV: development
    container_name: commute_api
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8787:8787"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules

  web:
    build:
      context: ./web
    container_name: commute_web
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://localhost:8787
    depends_on:
      - api
    ports:
      - "4173:4173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

volumes:
  db_data:
  api_node_modules:
  web_node_modules:
